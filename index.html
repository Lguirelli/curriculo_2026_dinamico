<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Lorenzo OS — Currículo e Portfólio</title>
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/desktop.css" />
  <link rel="stylesheet" href="css/windows.css" />
  <link rel="stylesheet" href="css/mobile.css" />
  <link rel="stylesheet" href="css/games.css" />
  <link rel="stylesheet" href="css/components/desktop-clock.css" />
</head>
<body>
  <main id="desktopOS" class="desktop-os" aria-label="Desktop portfolio">
    <header class="top-panel">
      <button id="startButton" class="top-apps-button" type="button">Apps</button>
      <div id="topPanelClock" class="top-panel-clock">quinta, 28 de maio 00:00</div>
      <div class="top-panel-status">
        <span>pt</span>
        <span>◔</span>
        <span>⌁</span>
        <span>▣</span>
      </div>
    </header>

    <section id="desktopArea" class="desktop-area">
      <div class="wallpaper-scene" aria-hidden="true">
        <div class="wallpaper-moon"></div>
        <div class="wallpaper-mist mist-a"></div>
        <div class="wallpaper-mist mist-b"></div>
      </div>
      <div id="desktopClockMount" class="desktop-clock-mount" aria-label="Relógio e data do sistema"></div>
      <div id="desktopIcons" class="desktop-icons"></div>
    </section>

    <aside id="startMenu" class="start-menu" aria-label="Menu de aplicativos">
      <div class="start-menu-sidebar">
        <strong>All Applications</strong>
        <span>Currículo</span>
        <span>Portfólio</span>
        <span>Jogos</span>
      </div>
      <div class="start-menu-grid">
        <button data-open-folder="f1"><span>DIR</span><small>F1</small></button>
        <button data-open-folder="ia"><span>DIR</span><small>IA</small></button>
        <button data-open-folder="web"><span>DIR</span><small>Web</small></button>
        <button data-open-folder="branding"><span>DIR</span><small>Branding</small></button>
        <button data-open-game="snake" class="start-game-button"><span class="start-game-thumb" style="background-image:url('assets/icons/game-snake.png')"></span><small>Snake</small></button>
        <button data-open-game="mines" class="start-game-button"><span class="start-game-thumb" style="background-image:url('assets/icons/game-mines.png')"></span><small>Campo Minado</small></button>
        <button data-open-game="pong" class="start-game-button"><span class="start-game-thumb" style="background-image:url('assets/icons/game-pong.png')"></span><small>Pong</small></button>
      </div>
    </aside>

    <nav class="dock" aria-label="Contatos">
  <a href="#" class="dock-icon" title="Email" aria-label="Email">
    <img class="dock-icon-img" src="assets/icons/email.svg" alt="" aria-hidden="true" draggable="false" />
  </a>
  <a href="#" class="dock-icon" title="LinkedIn" aria-label="LinkedIn">
    <img class="dock-icon-img" src="assets/icons/linkedin.svg" alt="" aria-hidden="true" draggable="false" />
  </a>
  <a href="#" class="dock-icon" title="GitHub" aria-label="GitHub">
    <img class="dock-icon-img" src="assets/icons/github.svg" alt="" aria-hidden="true" draggable="false" />
  </a>
  <a href="#" class="dock-icon" title="Instagram" aria-label="Instagram">
    <img class="dock-icon-img" src="assets/icons/instagram.svg" alt="" aria-hidden="true" draggable="false" />
  </a>
  <a href="#" class="dock-icon" title="WhatsApp" aria-label="WhatsApp">
    <img class="dock-icon-img" src="assets/icons/whatsapp.svg" alt="" aria-hidden="true" draggable="false" />
  </a>
</nav>

    <section id="windowsLayer" class="windows-layer" aria-label="Janelas abertas"></section>
  </main>

  <main id="mobileOS" class="mobile-os" aria-label="Mobile portfolio">
    <section class="phone-screen">
      <header class="mobile-status">
        <span id="mobileClock">00:00</span>
        <span>▮▮ 5G ◔</span>
      </header>

      <section id="mobileHome" class="mobile-page active">
        <div class="mobile-hero">
          <span class="moon">☾</span>
          <h1>Lorenzo OS</h1>
          <p>Currículo, portfólio e experimentos digitais.</p>
        </div>
        <div class="mobile-app-grid">
          <button class="mobile-app" data-mobile-open="notes"><span>📝</span><small>Notas</small></button>
          <button class="mobile-app" data-mobile-open="f1"><span>🏎</span><small>F1</small></button>
          <button class="mobile-app" data-mobile-open="ia"><span>🤖</span><small>IA</small></button>
          <button class="mobile-app" data-mobile-open="web"><span>🌐</span><small>Web</small></button>
          <button class="mobile-app" data-mobile-open="branding"><span>✦</span><small>Branding</small></button>
          <button class="mobile-app folder" data-mobile-open="games"><span>🎮</span><small>Jogos</small></button>
          <button class="mobile-app"><span>✉</span><small>Email</small></button>
          <button class="mobile-app"><span>⌘</span><small>GitHub</small></button>
        </div>
      </section>

      <section id="mobileAppView" class="mobile-page mobile-app-view">
        <header class="mobile-app-header"><button id="mobileBackTop">‹</button><h2 id="mobileAppTitle">App</h2></header>
        <div id="mobileAppContent" class="mobile-app-content"></div>
      </section>

      <nav class="mobile-nav">
        <button id="mobileScreens" aria-label="Telas abertas">▢</button>
        <button id="mobileHomeBtn" aria-label="Home">○</button>
        <button id="mobileBack" aria-label="Voltar">◂</button>
      </nav>
    </section>
  </main>

  <script src="js/data.js"></script>
  <script src="js/windows.js"></script>
  <script src="js/desktop.js"></script>
  <script src="js/mobile.js"></script>
  <script src="js/games.js"></script>
  <script src="js/components/desktop-clock.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
