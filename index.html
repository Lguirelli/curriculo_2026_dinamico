<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Lorenzo OS | Currículo e Portfólio</title>
  <link rel="stylesheet" href="css/reset.css" />
  <link rel="stylesheet" href="css/theme.css" />
  <link rel="stylesheet" href="css/desktop.css" />
  <link rel="stylesheet" href="css/windows.css" />
  <link rel="stylesheet" href="css/mobile.css" />
  <link rel="stylesheet" href="css/games.css" />
</head>
<body>
  <main class="desktop-os" id="desktopOs" aria-label="Versão desktop do portfólio">
    <section class="desktop-wallpaper" id="desktopArea">
      <div class="center-clock" aria-hidden="true">
        <span id="desktopHeroHour">00</span>
        <span id="desktopHeroMinute">00</span>
        <small id="desktopHeroDate">LOADING</small>
      </div>
      <div id="desktopIcons" class="desktop-icons"></div>
      <div id="windowLayer" class="window-layer"></div>
    </section>

    <nav class="desktop-topbar">
      <button class="system-pill" id="appMenuBtn" type="button">Apps</button>
      <div class="topbar-center" id="topbarClock">--:--</div>
      <div class="topbar-status">
        <span>pt</span><span>◐</span><span>▣</span><span>▰</span>
      </div>
    </nav>

    <aside class="app-menu" id="appMenu" aria-hidden="true">
      <div class="app-menu-head">Aplicativos</div>
      <div class="app-menu-grid" id="appMenuGrid"></div>
    </aside>

    <nav class="desktop-dock" aria-label="Contatos">
      <a class="dock-icon" href="mailto:guirellilorenzo1@gmail.com" title="Email">✉</a>
      <a class="dock-icon" href="https://www.linkedin.com/" target="_blank" rel="noreferrer" title="LinkedIn">in</a>
      <a class="dock-icon" href="https://github.com/Lguirelli" target="_blank" rel="noreferrer" title="GitHub">GH</a>
      <a class="dock-icon" href="https://www.instagram.com/" target="_blank" rel="noreferrer" title="Instagram">◎</a>
      <button class="dock-icon" type="button" data-open-contact title="Contato">☎</button>
    </nav>
  </main>

  <main class="mobile-os" id="mobileOs" aria-label="Versão mobile do portfólio">
    <section class="phone-shell">
      <header class="phone-statusbar">
        <span id="mobileClock">--:--</span>
        <span>▴ 4G ◉ 76</span>
      </header>
      <section class="phone-screen" id="mobileScreen"></section>
      <nav class="mobile-nav" aria-label="Navegação mobile">
        <button type="button" id="mobileTasks" aria-label="Telas abertas">▢</button>
        <button type="button" id="mobileHome" aria-label="Home">○</button>
        <button type="button" id="mobileBack" aria-label="Voltar">◀</button>
      </nav>
    </section>
  </main>

  <script src="js/data/content.js"></script>
  <script src="js/core/clock.js"></script>
  <script src="js/core/windows.js"></script>
  <script src="js/desktop/desktop-icons.js"></script>
  <script src="js/mobile/mobile.js"></script>
  <script src="js/games/snake.js"></script>
  <script src="js/games/mines.js"></script>
  <script src="js/games/pong.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
