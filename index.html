<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio OS Games POC</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="os-shell">
    <section class="desktop-view" aria-label="Versão desktop">
      <aside class="desktop-widgets">
        <article class="widget time-widget">
          <strong data-clock>00:00</strong>
          <span>Local time</span>
        </article>

        <article class="widget system-widget">
          <strong>Hello Lorenzo</strong>
          <span>WiFi: Portfolio OS</span>
          <span>CPU: <b data-random-cpu>32%</b></span>
          <div class="mini-chart"></div>
          <span>RAM: <b data-random-ram>48%</b></span>
          <div class="bar"><i data-random-bar></i></div>
        </article>

        <article class="widget weather-widget">
          <div class="weather-icon">☁</div>
          <strong><span data-weather-temp>--</span>°C</strong>
          <span data-weather-desc>Carregando clima</span>
          <small data-weather-extra>Detectando localização...</small>
        </article>

        <article class="widget date-widget">
          <b data-date-day>00</b>
          <div>
            <strong data-weekday>Monday</strong>
            <span data-full-date>January 2026</span>
          </div>
        </article>
      </aside>

      <div class="desktop-wallpaper" aria-hidden="true">
        <div class="wave-circle">
          <div class="wave">∿</div>
        </div>
      </div>

      <section class="desktop-icons" data-desktop-icons>
        <button class="desktop-icon desktop-text-file" data-open="about" data-col="0" data-row="0"><span>TXT</span><small>Sobre.txt</small></button>
        <button class="desktop-icon desktop-text-file" data-open="experience" data-col="0" data-row="1"><span>TXT</span><small>Experiência.txt</small></button>
        <button class="desktop-icon desktop-text-file" data-open="education" data-col="0" data-row="2"><span>TXT</span><small>Formação.txt</small></button>
        <button class="desktop-icon desktop-text-file" data-open="skills" data-col="0" data-row="3"><span>TXT</span><small>Skills.txt</small></button>
        <button class="desktop-icon desktop-text-file" data-open="contact" data-col="0" data-row="4"><span>TXT</span><small>Contato.txt</small></button>

        <button class="desktop-icon desktop-folder" data-open="f1" data-anchor="right" data-col="0" data-row="0"><span></span><small>F1</small></button>
        <button class="desktop-icon desktop-folder" data-open="ia" data-anchor="right" data-col="0" data-row="1"><span></span><small>IA</small></button>
        <button class="desktop-icon desktop-folder" data-open="web" data-anchor="right" data-col="0" data-row="2"><span></span><small>Web</small></button>
        <button class="desktop-icon desktop-folder" data-open="branding" data-anchor="right" data-col="0" data-row="3"><span></span><small>Branding</small></button>

        <button class="desktop-icon desktop-game" data-open="snake" data-anchor="right" data-col="0" data-row="5"><span>🐍</span><small>Snake</small></button>
        <button class="desktop-icon desktop-game" data-open="mines" data-anchor="right" data-col="0" data-row="6"><span>💣</span><small>Mines</small></button>
        <button class="desktop-icon desktop-game" data-open="pong" data-anchor="right" data-col="0" data-row="7"><span>🏓</span><small>Pong</small></button>
      </section>

      <div class="window-layer" data-window-layer></div>

      <footer class="taskbar">
        <button class="start-button" data-start>◎ Application</button>
        <nav class="taskbar-contact-icons" aria-label="Contatos">
          <a href="mailto:guirellilorenzo1@gmail.com" title="Email">✉</a>
          <a href="https://www.linkedin.com/" target="_blank" rel="noreferrer" title="LinkedIn">in</a>
          <a href="https://github.com/" target="_blank" rel="noreferrer" title="GitHub">⌘</a>
          <a href="https://wa.me/5500000000000" target="_blank" rel="noreferrer" title="WhatsApp">☎</a>
          <a href="https://www.instagram.com/" target="_blank" rel="noreferrer" title="Instagram">◎</a>
        </nav>
        <div class="taskbar-status">
          <span>♫</span>
          <span data-taskbar-weather>--°C</span>
          <span data-taskbar-date>---</span>
          <span data-taskbar-clock>00:00</span>
          <span>◖ <b data-battery>64%</b></span>
        </div>
      </footer>
    </section>

    <section class="mobile-view" aria-label="Versão mobile">
      <div class="phone-frame">
        <header class="phone-statusbar">
          <span data-clock>00:00</span>
          <span>● ● ●  64%</span>
        </header>

        <section class="phone-home" data-phone-home>
          <button class="mobile-app" data-open-mobile="notes"><span>📝</span><small>Notas</small></button>
          <button class="mobile-app" data-open-mobile="portfolio"><span>🖼</span><small>Portfolio</small></button>
          <button class="mobile-folder" data-open-folder="games"><span class="folder-preview">🐍 💣 🏓</span><small>jogos</small></button>
          <button class="mobile-app" data-open-mobile="contact"><span>☎</span><small>Contato</small></button>
        </section>

        <section class="folder-screen hidden" data-folder-screen>
          <header>
            <button data-close-folder>‹</button>
            <strong>jogos</strong>
          </header>
          <div class="folder-grid">
            <button class="mobile-app" data-open="snake"><span>🐍</span><small>Snake</small></button>
            <button class="mobile-app" data-open="mines"><span>💣</span><small>Campo Minado</small></button>
            <button class="mobile-app" data-open="pong"><span>🏓</span><small>Pong</small></button>
          </div>
        </section>

        <section class="mobile-window hidden" data-mobile-window>
          <header>
            <button data-mobile-back>‹</button>
            <strong data-mobile-title>App</strong>
          </header>
          <div class="mobile-window-body" data-mobile-body></div>
        </section>
      </div>
    </section>
  </main>

  <template id="snake-template">
    <div class="game-shell snake-game">
      <div class="game-head"><span>Pontos: <b data-score>0</b></span><button data-game-reset>Reset</button></div>
      <canvas width="320" height="320" data-snake-canvas></canvas>
      <div class="game-controls"><button data-dir="up">↑</button><button data-dir="left">←</button><button data-dir="down">↓</button><button data-dir="right">→</button></div>
      <p class="game-tip">Use as setas do teclado ou os botões.</p>
    </div>
  </template>

  <template id="mines-template">
    <div class="game-shell mines-game">
      <div class="game-head"><span>Bombas: <b data-mines-count>10</b></span><button data-game-reset>Reset</button></div>
      <div class="mines-board" data-mines-board></div>
      <p class="game-tip">Clique para revelar. Clique direito para marcar bandeira.</p>
    </div>
  </template>

  <template id="pong-template">
    <div class="game-shell pong-game">
      <div class="game-head"><span><b data-player-score>0</b> : <b data-ai-score>0</b></span><button data-game-reset>Reset</button></div>
      <canvas width="420" height="260" data-pong-canvas></canvas>
      <p class="game-tip">Mova o mouse ou arraste na tela para controlar a barra.</p>
    </div>
  </template>

  <template id="about-template">
    <article class="text-file">
      <h2>sobre.txt</h2>
      <p>Este é um esqueleto de portfolio em formato de sistema operacional.</p>
      <p>No desktop, os jogos abrem como janelas arrastáveis. No mobile, ficam dentro da pasta <strong>jogos</strong>.</p>
    </article>
  </template>

  <template id="experience-template">
    <article class="text-file">
      <h2>experiência.txt</h2>
      <p>Lorem ipsum dolor sit amet, consectetur adipiscing elit. Integer nec odio.</p>
      <p>Placeholder para experiências profissionais, entregas, responsabilidades e resultados.</p>
    </article>
  </template>

  <template id="education-template">
    <article class="text-file">
      <h2>formação.txt</h2>
      <p>Lorem ipsum dolor sit amet, consectetur adipiscing elit.</p>
      <p>Placeholder para graduação, cursos, certificações e estudos complementares.</p>
    </article>
  </template>

  <template id="skills-template">
    <article class="text-file">
      <h2>skills.txt</h2>
      <p>IA, automação, marketing digital, branding, edição de vídeo, dados, front-end e integração com APIs.</p>
      <p>Lorem ipsum dolor sit amet, consectetur adipiscing elit.</p>
    </article>
  </template>

  <template id="contact-template">
    <article class="text-file">
      <h2>contato.txt</h2>
      <p>Email: guirellilorenzo1@gmail.com</p>
      <p>Placeholder para LinkedIn, GitHub, Instagram e WhatsApp.</p>
    </article>
  </template>

  <template id="f1-template">
    <article class="portfolio-file">
      <h2>F1 Visualizer</h2>
      <p>Placeholder de projeto para visualizador interativo de Fórmula 1.</p>
      <div class="portfolio-placeholder">Preview / imagem / vídeo do projeto</div>
    </article>
  </template>

  <template id="ia-template">
    <article class="portfolio-file">
      <h2>Agentes de IA</h2>
      <p>Placeholder de projeto para automações, agentes de atendimento e fluxos com IA.</p>
      <div class="portfolio-placeholder">Preview / fluxograma / dashboard</div>
    </article>
  </template>

  <template id="web-template">
    <article class="portfolio-file">
      <h2>Web / Landing Pages</h2>
      <p>Placeholder de projeto para páginas, interfaces e experiências digitais.</p>
      <div class="portfolio-placeholder">Preview / mockup / URL</div>
    </article>
  </template>

  <template id="branding-template">
    <article class="portfolio-file">
      <h2>Branding</h2>
      <p>Placeholder de projeto para identidade visual, posicionamento e conteúdo.</p>
      <div class="portfolio-placeholder">Preview / cases / peças</div>
    </article>
  </template>

  <script src="app.js"></script>
</body>
</html>
