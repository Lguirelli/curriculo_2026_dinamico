        <span>⌁</span>

      </div>
      <div id="desktopClockMount" class="desktop-clock-mount" aria-label="Relógio e data do sistema"></div>
      <div id="desktopIcons" class="desktop-icons"></div>
    </section>

    <nav class="dock" aria-label="Contatos e pesquisa" data-dock>
  <form class="dock-search-form" data-search-form>
    <button type="button" class="dock-icon dock-search-toggle" title="Pesquisar" aria-label="Pesquisar" data-search-toggle>
      <img class="dock-icon-img" src="assets/icons/search.svg" alt="" aria-hidden="true" draggable="false" />
    </button>
    <input id="desktopSearchInput" class="dock-search-input" type="search" autocomplete="off" placeholder="Search..." aria-label="Pesquisar no portfólio" />
    <button type="submit" class="dock-search-submit" aria-label="Pesquisar">
      <img src="assets/icons/search.svg" alt="" aria-hidden="true" draggable="false" />
    </button>
  </form>
  <a href="#" class="dock-icon dock-contact-icon" title="Email" aria-label="Email">
    <img class="dock-icon-img" src="assets/icons/email.svg" alt="" aria-hidden="true" draggable="false" />
  </a>
  <a href="#" class="dock-icon dock-contact-icon" title="LinkedIn" aria-label="LinkedIn">
    <img class="dock-icon-img" src="assets/icons/linkedin.svg" alt="" aria-hidden="true" draggable="false" />
  </a>
  <a href="#" class="dock-icon dock-contact-icon" title="Instagram" aria-label="Instagram">
    <img class="dock-icon-img" src="assets/icons/instagram.svg" alt="" aria-hidden="true" draggable="false" />
  </a>
  <a href="#" class="dock-icon dock-contact-icon" title="WhatsApp" aria-label="WhatsApp">
    <img class="dock-icon-img" src="assets/icons/whatsapp.svg" alt="" aria-hidden="true" draggable="false" />
  </a>
  <div id="desktopSearchResults" class="dock-search-results" aria-live="polite"></div>
</nav>
